# ------------------------------------------------------------------------------
# General
# ------------------------------------------------------------------------------

# Change prefix from Ctrl+b to Ctrl+a (easier to reach, like GNU Screen)
# Comment these two lines out if you prefer the default Ctrl+b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Reduce escape-time (important for Vim/Neovim users)
set -sg escape-time 10

# Enable focus events (used by some editors)
set -g focus-events on

# ------------------------------------------------------------------------------
# Mouse support
# ------------------------------------------------------------------------------

set -g mouse on

# ------------------------------------------------------------------------------
# Visual / Colors
# ------------------------------------------------------------------------------

# Enable 256 colors and true color
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style bg=colour235,fg=colour250

# Left side: session name
set -g status-left " #[fg=colour39,bold]#S #[fg=colour250]│ "
set -g status-left-length 30

# Right side: host + date/time
set -g status-right "#[fg=colour250]%H:%M  %d %b #[fg=colour39,bold] #h "
set -g status-right-length 50

# Window tabs
set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[fg=colour39,bold,bg=colour238] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style        fg=colour238
set -g pane-active-border-style fg=colour39

# Message bar (command prompt)
set -g message-style bg=colour235,fg=colour39

# ------------------------------------------------------------------------------
# Key bindings
# ------------------------------------------------------------------------------

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and - (much more intuitive than " and %)
# New panes open in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in current directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + H/J/K/L (hold to repeat)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching with prefix + n/p
bind -r n next-window
bind -r p previous-window

# Swap windows left/right with prefix + < / >
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Kill pane/window without confirmation prompt
bind x kill-pane
bind X kill-window

# Enter copy mode with prefix + v (Vim-like)
bind v copy-mode

# ------------------------------------------------------------------------------
# Copy mode (Vi keys)
# ------------------------------------------------------------------------------

setw -g mode-keys vi

bind -T copy-mode-vi v   send -X begin-selection
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard'"
bind -T copy-mode-vi Escape send -X cancel

# ------------------------------------------------------------------------------
# Activity alerts
# ------------------------------------------------------------------------------

set -g monitor-activity on
set -g visual-activity off

# ------------------------------------------------------------------------------
# Plugins (TPM)
# ------------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
